services:
  - type: web
    name: supernova-intel-api
    env: docker
    plan: free
    autoDeploy: true
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: VOICE_VIBE_BRIDGE_TOKEN
        sync: false
